const calcRPM=(Vc,d)=>d<=0?2000:Math.round((Vc*1000)/(Math.PI*d));

// ═══ G-CODE HELPERS ═══
function gcLine(ctrl,lines,comment){
  const L=[];
  const cm=t=>{if(ctrl==="siemens")L.push("; "+t);else L.push("("+t+")");};
  const a=l=>L.push(l);
  if(comment)cm(comment);
  lines.forEach(l=>a(l));
  return L;
}

function gcHeader(ctrl,controller,p,mat,partTypeName,extraInfo){
  const L=[];
  const cm=t=>{if(ctrl==="siemens")L.push("; "+t);else L.push("("+t+")");};
  if(ctrl==="fanuc"||ctrl==="mitsubishi"){L.push("%");L.push("O0001");}
  else if(ctrl==="okuma")L.push("G10 (CNC LATHE MACHINING)");
  else L.push("%_N_PART_MPF");
  cm("════════════════════════════════════════════════");
  cm("  CNC 車床加工程式 — "+partTypeName);
  cm("  CNC G-Code Generator v4.0 Pro");
  cm("════════════════════════════════════════════════");
  cm("  控制器: "+controller);
  cm("  材  質: "+p.material+" ("+mat.hardness+")");
  if(extraInfo)extraInfo.forEach(s=>cm("  "+s));
  cm("────────────────────────────────────────────────");
  cm("  粗車 Vc="+mat.rough.Vc+" f="+mat.rough.f+" ap="+mat.rough.ap);
  cm("  精車 Vc="+mat.finish.Vc+" f="+mat.finish.f+" ap="+mat.finish.ap);
  if(mat.bore)cm("  搪孔 Vc="+mat.bore.Vc+" f="+mat.bore.f+" ap="+mat.bore.ap);
  cm("════════════════════════════════════════════════");
  L.push("");
  return L;
}

function gcSafeStart(ctrl,maxRPM){
  const L=[];const cm=t=>{if(ctrl==="siemens")L.push("; "+t);else L.push("("+t+")");};
  cm("═══ 安全起始塊 ═══");
  if(ctrl==="fanuc"||ctrl==="mitsubishi"){L.push("N10 G40 G80 G99");L.push("N11 G28 U0 W0");L.push("N12 G50 S"+maxRPM);}
  else if(ctrl==="okuma"){L.push("N10 G40 G80");L.push("N11 G28 W0");L.push("N12 G28 U0");L.push("N13 G50 S"+maxRPM);}
  else{L.push("N10 G40 G80");L.push("N11 G28 U0 W0");L.push("N12 LIMS="+maxRPM);}
  L.push("");return L;
}

function gcFacing(ctrl,mat,bar,useG96,safe,coolM,Nbase){
  const L=[];const cm=t=>{if(ctrl==="siemens")L.push("; "+t);else L.push("("+t+")");};
  const N=Nbase||200;
  const roughRPM=useG96?mat.rough.Vc:calcRPM(mat.rough.Vc,bar);
  const spd=useG96?"G96 S"+mat.rough.Vc:"G97 S"+roughRPM;
  cm("═══ 端面車削 ═══");
  if(ctrl==="okuma")L.push("N"+N+" T0101");
  else if(ctrl==="siemens")L.push("N"+N+" T1D1");
  else L.push("N"+N+" G00 T0101");
  L.push(spd+" M03");L.push(coolM);
  L.push("G00 X"+(bar+2).toFixed(3)+" Z"+safe.toFixed(1));
  L.push("G00 Z0.3");
  L.push("G01 X"+(bar+0.5).toFixed(3)+" Z0 F"+mat.rough.f);
  L.push("G01 X-1.6 F"+mat.rough.f);
  cm("端面精修");
  L.push("G00 X"+(bar+0.5).toFixed(3)+" Z0.1");
  L.push("G01 X"+(bar+0.5).toFixed(3)+" Z0 F"+mat.finish.f);
  L.push("G01 X-1.6 F"+mat.finish.f);
  L.push("G00 Z"+safe.toFixed(1));L.push("");
  return L;
}

function gcCenterDrill(ctrl,mat,safe,coolM,depth){
  const L=[];const cm=t=>{if(ctrl==="siemens")L.push("; "+t);else L.push("("+t+")");};
  const drillRPM=calcRPM(mat.drill.Vc,3);
  cm("═══ 中心鑽孔 ═══");
  if(ctrl==="okuma")L.push("N100 T0505");
  else if(ctrl==="siemens")L.push("N100 T5D5");
  else L.push("N100 G00 T0505");
  L.push("G97 S"+drillRPM+" M03");L.push(coolM);
  L.push("G00 X0 Z"+safe.toFixed(1));L.push("G00 Z2.0");
  L.push("G01 Z"+(-depth).toFixed(1)+" F"+mat.drill.f);
  L.push("G04 P500");cm("排屑停留");
  L.push("G00 Z"+safe.toFixed(1));L.push("");
  return L;
}

function gcDrilling(ctrl,mat,safe,coolM,drillDia,depth,through){
  const L=[];const cm=t=>{if(ctrl==="siemens")L.push("; "+t);else L.push("("+t+")");};
  const drillRPM=calcRPM(mat.drill.Vc,drillDia);
  cm("═══ 鑽孔 Ø"+drillDia.toFixed(1)+" 深"+depth.toFixed(1)+" ═══");
  if(ctrl==="okuma")L.push("T0606");
  else if(ctrl==="siemens")L.push("T6D6");
  else L.push("G00 T0606");
  L.push("G97 S"+drillRPM+" M03");L.push(coolM);
  L.push("G00 X0 Z"+safe.toFixed(1));L.push("G00 Z2.0");
  // Peck drilling G83
  const peck=Math.min(drillDia*2,depth/3);
  if(ctrl==="siemens"){
    L.push("CYCLE83(2,0,"+(-depth).toFixed(1)+",,,"+mat.drill.f+","+peck.toFixed(1)+",,,)");
  }else{
    L.push("G83 Z"+(-depth).toFixed(3)+" Q"+(peck*1000).toFixed(0)+" R2.0 F"+mat.drill.f);
    L.push("G80");
  }
  L.push("G00 Z"+safe.toFixed(1));L.push("");
  return L;
}

function gcBoring(ctrl,mat,safe,coolM,boreDia,boreDepth,useG96){
  const L=[];const cm=t=>{if(ctrl==="siemens")L.push("; "+t);else L.push("("+t+")");};
  const boreRPM=useG96?mat.bore.Vc:calcRPM(mat.bore.Vc,boreDia);
  const spd=useG96?"G96 S"+mat.bore.Vc:"G97 S"+boreRPM;
  cm("═══ 搪孔精修 Ø"+boreDia.toFixed(3)+" ═══");
  if(ctrl==="okuma")L.push("T0909");
  else if(ctrl==="siemens")L.push("T9D9");
  else L.push("G00 T0909");
  L.push(spd+" M03");L.push(coolM);
  L.push("G00 X"+(boreDia-2).toFixed(3)+" Z"+safe.toFixed(1));
  L.push("G00 Z2.0");
  // Rough bore
  const passes=Math.ceil(1.0/mat.bore.ap);
  for(let i=0;i<passes;i++){
    const d=boreDia-1.0+mat.bore.ap*(i+1);
    if(d>boreDia-0.1)break;
    L.push("G01 X"+d.toFixed(3)+" F"+mat.bore.f);
    L.push("G01 Z"+(-boreDepth).toFixed(3));
    L.push("G00 X"+(d-0.5).toFixed(3));
    L.push("G00 Z2.0");
  }
  // Finish bore
  cm("精搪");
  L.push("G01 X"+boreDia.toFixed(3)+" F"+(mat.bore.f*0.6).toFixed(3));
  L.push("G01 Z"+(-boreDepth).toFixed(3));
  L.push("G00 X"+(boreDia-0.5).toFixed(3));
  L.push("G00 Z"+safe.toFixed(1));L.push("");
  return L;
}

function gcExtThread(ctrl,mat,thread,shankDia,threadLen,totalLen,safe,threadInfeed,chamfer){
  const L=[];const cm=t=>{if(ctrl==="siemens")L.push("; "+t);else L.push("("+t+")");};
  const thAngle=thread.angle||60;
  const threadRPM=calcRPM(mat.thread.Vc,shankDia);
  const thDepth=(thread.major-thread.minor)/2;
  const thDepthUm=Math.round(thDepth*1000);
  const firstCut=Math.round(thDepthUm*0.3);
  const minCut=Math.max(10,Math.round(thDepthUm*0.05));
  const thTool=thAngle===55?"T0707":thAngle===29?"T0808":"T0303";
  cm("═══ 外螺紋車削 "+thAngle+"° ═══");
  cm("  導程="+thread.pitch+"mm 大徑Ø"+thread.major+" 小徑Ø"+thread.minor);
  cm("  切深="+thDepth.toFixed(3)+"mm ("+thDepthUm+"μm) 含2次彈刀");
  const thEndPos=-(totalLen-chamfer);
  if(ctrl==="fanuc"||ctrl==="mitsubishi"){
    L.push("G00 "+thTool);L.push("G97 S"+threadRPM+" M03");
    L.push("G00 X"+(thread.major+2).toFixed(3)+" Z"+safe.toFixed(1));
    const pa=thAngle===60?"060":thAngle===55?"055":"029";
    L.push("G76 P02"+pa+" Q"+minCut+" R0.03");
    if(thread.taper){const tR=thread.taper*threadLen/2;L.push("G76 X"+thread.minor.toFixed(3)+" Z"+thEndPos.toFixed(3)+" R"+tR.toFixed(3)+" P"+thDepthUm+" Q"+firstCut+" F"+thread.pitch);}
    else L.push("G76 X"+thread.minor.toFixed(3)+" Z"+thEndPos.toFixed(3)+" R0 P"+thDepthUm+" Q"+firstCut+" F"+thread.pitch);
  }else if(ctrl==="okuma"){
    L.push(thTool);L.push("G97 S"+threadRPM+" M03");
    L.push("G00 X"+(thread.major+2).toFixed(3)+" Z"+safe.toFixed(1));
    if(thread.taper){const tR=thread.taper*threadLen/2;L.push("G76 X"+thread.minor.toFixed(3)+" Z"+thEndPos.toFixed(3)+" K"+thDepth.toFixed(3)+" D"+firstCut+" A"+thAngle+" P2 R"+tR.toFixed(3)+" F"+thread.pitch);}
    else L.push("G76 X"+thread.minor.toFixed(3)+" Z"+thEndPos.toFixed(3)+" K"+thDepth.toFixed(3)+" D"+firstCut+" A"+thAngle+" P2 F"+thread.pitch);
  }else{
    L.push("T3D3");L.push("G97 S"+threadRPM+" M03");
    L.push("CYCLE97("+thread.major.toFixed(3)+",0,"+thEndPos.toFixed(3)+","+thread.minor.toFixed(3)+","+thread.pitch+",,,1,,,,0.03)");
  }
  L.push("G00 X"+(shankDia+4).toFixed(3)+" Z"+safe.toFixed(1));L.push("");
  return L;
}

function gcIntThread(ctrl,mat,thread,boreDia,threadLen,startZ,safe){
  const L=[];const cm=t=>{if(ctrl==="siemens")L.push("; "+t);else L.push("("+t+")");};
  const threadRPM=calcRPM(mat.thread.Vc,thread.major);
  const thDepth=(thread.major-thread.minor)/2;
  const thDepthUm=Math.round(thDepth*1000);
  const firstCut=Math.round(thDepthUm*0.3);
  const minCut=Math.max(10,Math.round(thDepthUm*0.05));
  cm("═══ 內螺紋車削 ═══");
  cm("  導程="+thread.pitch+" 大徑Ø"+thread.major+" 小徑Ø"+thread.minor);
  const thEndZ=startZ-threadLen;
  if(ctrl==="fanuc"||ctrl==="mitsubishi"){
    L.push("G00 T1010");L.push("G97 S"+threadRPM+" M03");
    L.push("G00 X"+(thread.minor-2).toFixed(3)+" Z"+safe.toFixed(1));
    L.push("G76 P020060 Q"+minCut+" R0.03");
    L.push("G76 X"+thread.major.toFixed(3)+" Z"+thEndZ.toFixed(3)+" R0 P"+thDepthUm+" Q"+firstCut+" F"+thread.pitch);
  }else if(ctrl==="okuma"){
    L.push("T1010");L.push("G97 S"+threadRPM+" M03");
    L.push("G00 X"+(thread.minor-2).toFixed(3)+" Z"+safe.toFixed(1));
    L.push("G76 X"+thread.major.toFixed(3)+" Z"+thEndZ.toFixed(3)+" K"+thDepth.toFixed(3)+" D"+firstCut+" A60 P2 F"+thread.pitch);
  }else{
    L.push("T10D10");L.push("G97 S"+threadRPM+" M03");
    L.push("CYCLE97("+thread.minor.toFixed(3)+",0,"+thEndZ.toFixed(3)+","+thread.major.toFixed(3)+","+thread.pitch+",,,1,,,,0.03)");
  }
  L.push("G00 X"+(boreDia-2).toFixed(3)+" Z"+safe.toFixed(1));L.push("");
  return L;
}

function gcGrooving(ctrl,mat,grooves,bar,safe,coolM,useG96){
  // grooves: [{zPos,width,diameter}]
  const L=[];const cm=t=>{if(ctrl==="siemens")L.push("; "+t);else L.push("("+t+")");};
  if(!grooves||grooves.length===0)return L;
  const cutoffRPM=useG96?mat.cutoff.Vc:calcRPM(mat.cutoff.Vc,bar/2);
  const spd=useG96?"G96 S"+mat.cutoff.Vc:"G97 S"+cutoffRPM;
  cm("═══ 溝槽加工 ("+grooves.length+"條) ═══");
  if(ctrl==="okuma")L.push("T0404");
  else if(ctrl==="siemens")L.push("T4D4");
  else L.push("G00 T0404");
  L.push(spd+" M03");L.push(coolM);
  grooves.forEach((g,i)=>{
    cm("溝槽"+(i+1)+": Z="+g.zPos+" W="+g.width+" Ø"+g.diameter);
    L.push("G00 X"+(bar+2).toFixed(3)+" Z"+(-g.zPos).toFixed(3));
    L.push("G00 X"+(bar+0.5).toFixed(3));
    L.push("G01 X"+g.diameter.toFixed(3)+" F"+(mat.cutoff.f*0.8).toFixed(3));
    if(g.width>3.5){
      L.push("G01 Z"+(-g.zPos-g.width+1.5).toFixed(3));
      L.push("G01 Z"+(-g.zPos).toFixed(3));
    }
    L.push("G00 X"+(bar+2).toFixed(3));
  });
  L.push("G00 Z"+safe.toFixed(1));L.push("");
  return L;
}

function gcCutoff(ctrl,mat,bar,totalLen,partOffWidth,safe,coolM,useG96){
  const L=[];const cm=t=>{if(ctrl==="siemens")L.push("; "+t);else L.push("("+t+")");};
  const cutoffRPM=useG96?mat.cutoff.Vc:calcRPM(mat.cutoff.Vc,bar/2);
  const spd=useG96?"G96 S"+mat.cutoff.Vc:"G97 S"+cutoffRPM;
  const cf=mat.cutoff.f;
  const coZ=-(totalLen+partOffWidth/2+0.2);
  cm("═══ 切斷 ═══");cm("  刀寬="+partOffWidth+"mm 分段進刀");
  if(ctrl==="okuma")L.push("T0404");
  else if(ctrl==="siemens")L.push("T4D4");
  else L.push("G00 T0404");
  L.push(spd+" M03");L.push(coolM);
  L.push("G00 X"+(bar+2).toFixed(3)+" Z"+coZ.toFixed(3));
  L.push("G00 X"+(bar+0.5).toFixed(3));
  const mid=bar*0.4;
  L.push("G01 X"+mid.toFixed(3)+" F"+cf);
  cm("退刀排屑");
  L.push("G00 X"+(mid+0.5).toFixed(3));L.push("G04 P300");
  L.push("G01 X"+mid.toFixed(3)+" F"+cf);
  cm("慢速過中心");
  L.push("G01 X-0.5 F"+(cf*0.7).toFixed(3));L.push("");
  return L;
}

function gcEnd(ctrl){
  const L=[];const cm=t=>{if(ctrl==="siemens")L.push("; "+t);else L.push("("+t+")");};
  cm("═══ 程式結束 ═══");
  if(ctrl==="fanuc"||ctrl==="mitsubishi"){L.push("N900 G28 U0 W0");L.push("M09");L.push("M05");L.push("T0100");cm("重置刀補");L.push("M30");L.push("%");}
  else if(ctrl==="okuma"){L.push("N900 G28 W0");L.push("G28 U0");L.push("M09");L.push("M05");L.push("T0100");L.push("M02");}
  else{L.push("N900 G28 U0 W0");L.push("M09");L.push("M05");L.push("M30");}
  return L;
}

// ═══ PER-PART-TYPE G-CODE GENERATORS ═══
function generateGCode(p){
  const ctrl=CONTROLLERS[p.controller]||"fanuc";
  const mat=MATERIALS[p.material]||MATERIALS["S45C 中碳鋼"];
  const coolM=p.coolantType==="mist"?"M07":"M08";
  const safe=p.safeZ||5;
  const bar=p.barDiameter||12;
  const tl=p.totalLength||30;
  const pw=p.partOffWidth||3;

  // Resolve thread
  let thread=null;
  if(p.threadSpec==="自訂")thread=p.customThread;
  else if(p.threadCategory&&THREAD_DB[p.threadCategory])thread=THREAD_DB[p.threadCategory][p.threadSpec];

  const gen=GENERATORS[p.partType];
  if(!gen)return "// 錯誤：未知零件類型";
  return gen(p,ctrl,mat,coolM,safe,bar,tl,pw,thread);
}

const GENERATORS={};

// ═══ 1. SCREW / BOLT ═══
GENERATORS.screw=function(p,ctrl,mat,coolM,safe,bar,tl,pw,thread){
  if(!thread||!thread.major)return "// 錯誤：螺紋參數未設定";
  const L=[];const a=l=>L.push(l);const b=()=>L.push("");
  const cm=t=>{if(ctrl==="siemens")a("; "+t);else a("("+t+")");};
  const hd=p.headDiameter||thread.major*1.5,hl=p.headLength||thread.major*0.7;
  const sd=p.shankDiameter||thread.major,ch=p.chamferSize||0.5;
  const thLen=p.threadLength||20;
  const roughRPM=p.useG96?mat.rough.Vc:calcRPM(mat.rough.Vc,(bar+sd)/2);
  const finishRPM=p.useG96?mat.finish.Vc:calcRPM(mat.finish.Vc,sd);
  const ff=mat.finish.f,rf=mat.rough.f,rd=mat.rough.ap;
  const spdR=p.useG96?"G96 S"+mat.rough.Vc:"G97 S"+roughRPM;
  const spdF=p.useG96?"G96 S"+mat.finish.Vc:"G97 S"+finishRPM;

  gcHeader(ctrl,p.controller,p,mat,"螺絲/螺栓",["螺紋: "+(p.threadSpec==="自訂"?"自訂":p.threadSpec),"尺寸: L="+tl+" 頭Ø"+hd+" 桿Ø"+sd+" 棒Ø"+bar]).forEach(l=>a(l));
  gcSafeStart(ctrl,p.maxRPM||3500).forEach(l=>a(l));
  if(p.addCenterDrill)gcCenterDrill(ctrl,mat,safe,coolM,p.centerDrillDepth||3).forEach(l=>a(l));
  gcFacing(ctrl,mat,bar,p.useG96,safe,coolM).forEach(l=>a(l));

  // G71 rough
  cm("═══ 粗車外徑 G71 ═══");
  if(ctrl==="siemens"){a("G00 X"+(bar+2).toFixed(3)+" Z"+safe.toFixed(1));a(spdR+" M03");a('CYCLE95("CONTOUR1",'+rd+",0.3,0.1,,"+rf+",,,,0.5)");}
  else{a("G00 X"+(bar+2).toFixed(3)+" Z"+safe.toFixed(1));a(spdR+" M03");a("G71 U"+rd+" R0.5");
    if(ctrl==="okuma")a("G71 P300 Q400 U0.3 W0.1 F"+rf+" S"+(p.useG96?mat.rough.Vc:roughRPM));
    else a("G71 P300 Q400 U0.3 W0.1 F"+rf);}b();

  // Contour
  cm("═══ 精車輪廓 N300-N400 ═══");
  let zP=0;
  a("N300 G00 X"+(hd-ch*2).toFixed(3)+" Z"+ch.toFixed(3));
  a("G01 X"+hd.toFixed(3)+" Z0 F"+ff);zP=-hl;a("G01 Z"+zP.toFixed(3));
  if(hd>sd+0.1){const tr=Math.min((hd-sd)/2,2);a("G01 X"+sd.toFixed(3)+" Z"+(zP-tr).toFixed(3));zP-=tr;}
  else a("G01 X"+sd.toFixed(3));
  const thSZ=-(tl-thLen);
  if(p.hasUndercut){const ucW=p.undercutWidth||2,ucD=p.undercutDiameter||(thread.minor-0.3);
    if(zP>thSZ+ucW)a("G01 Z"+(thSZ+ucW).toFixed(3));
    a("G01 X"+ucD.toFixed(3));a("G01 Z"+thSZ.toFixed(3));a("G01 X"+sd.toFixed(3));}
  else{if(zP>thSZ)a("G01 Z"+thSZ.toFixed(3));}
  if(p.hasLeadChamfer){a("G01 Z"+(-tl+ch+0.3).toFixed(3));a("G01 X"+(sd+0.6).toFixed(3)+" Z"+(-tl+0.3).toFixed(3));a("G01 X"+(sd+ch*2+0.6).toFixed(3)+" Z"+(-tl).toFixed(3));}
  else{a("G01 Z"+(-tl+ch).toFixed(3));a("G01 X"+(sd+ch*2).toFixed(3)+" Z"+(-tl).toFixed(3));}
  a("N400 G01 X"+(bar+1).toFixed(3)+" Z"+(-tl).toFixed(3));b();

  // G70 finish
  cm("═══ 精車 G70 ═══");
  if(ctrl==="fanuc"||ctrl==="mitsubishi"){a("G00 T0202");a(spdF+" M03");if(p.useTNRC)a("G42");a("G70 P300 Q400");if(p.useTNRC)a("G40");}
  else if(ctrl==="okuma"){a("T0202");a(spdF+" M03");if(p.useTNRC)a("G42");a("G70 P300 Q400");if(p.useTNRC)a("G40");}
  else{a("T2D2");a(spdF+" M03");a('CYCLE95("CONTOUR1",0.05,0.02,0.02,,'+ff+",,,,0.2)");}
  a("G00 X"+(bar+2).toFixed(3)+" Z"+safe.toFixed(1));b();

  // Thread
  gcExtThread(ctrl,mat,thread,sd,thLen,tl,safe,p.threadInfeed,ch).forEach(l=>a(l));
  // Cutoff
  gcCutoff(ctrl,mat,bar,tl,pw,safe,coolM,p.useG96).forEach(l=>a(l));
  gcEnd(ctrl).forEach(l=>a(l));
  return L.join("\n");
};

// ═══ 2. STEPPED SHAFT ═══
GENERATORS.shaft=function(p,ctrl,mat,coolM,safe,bar,tl,pw,thread){
  const L=[];const a=l=>L.push(l);const b=()=>L.push("");
  const cm=t=>{if(ctrl==="siemens")a("; "+t);else a("("+t+")");};
  const steps=p.shaftSteps||[{diameter:bar-2,length:tl}];
  const ch=p.chamferSize||0.5;
  const maxD=Math.max(...steps.map(s=>s.diameter));
  const ff=mat.finish.f,rf=mat.rough.f,rd=mat.rough.ap;
  const roughRPM=p.useG96?mat.rough.Vc:calcRPM(mat.rough.Vc,(bar+maxD)/2);
  const finishRPM=p.useG96?mat.finish.Vc:calcRPM(mat.finish.Vc,steps[steps.length-1].diameter);
  const spdR=p.useG96?"G96 S"+mat.rough.Vc:"G97 S"+roughRPM;
  const spdF=p.useG96?"G96 S"+mat.finish.Vc:"G97 S"+finishRPM;

  const stepInfo=steps.map((s,i)=>"段"+(i+1)+": Ø"+s.diameter+"×"+s.length).join(" / ");
  gcHeader(ctrl,p.controller,p,mat,"階梯軸/光軸",["段數: "+steps.length,"尺寸: "+stepInfo,"棒材Ø"+bar+" 總長"+tl]).forEach(l=>a(l));
  gcSafeStart(ctrl,p.maxRPM||3500).forEach(l=>a(l));
  if(p.addCenterDrill)gcCenterDrill(ctrl,mat,safe,coolM,p.centerDrillDepth||3).forEach(l=>a(l));
  gcFacing(ctrl,mat,bar,p.useG96,safe,coolM).forEach(l=>a(l));

  // G71 rough
  cm("═══ 粗車外徑 G71 ═══");
  if(ctrl!=="siemens"){a("G00 X"+(bar+2).toFixed(3)+" Z"+safe.toFixed(1));a(spdR+" M03");a("G71 U"+rd+" R0.5");
    if(ctrl==="okuma")a("G71 P300 Q400 U0.3 W0.1 F"+rf+" S"+(p.useG96?mat.rough.Vc:roughRPM));
    else a("G71 P300 Q400 U0.3 W0.1 F"+rf);}
  else{a("G00 X"+(bar+2).toFixed(3)+" Z"+safe.toFixed(1));a(spdR+" M03");a('CYCLE95("CONTOUR1",'+rd+",0.3,0.1,,"+rf+",,,,0.5)");}b();

  // Contour for stepped shaft
  cm("═══ 精車輪廓 N300-N400 ═══");
  let zCur=0;
  const firstD=steps[0].diameter;
  a("N300 G00 X"+(firstD-ch*2).toFixed(3)+" Z"+ch.toFixed(3));
  a("G01 X"+firstD.toFixed(3)+" Z0 F"+ff);
  for(let i=0;i<steps.length;i++){
    const s=steps[i];zCur-=s.length;
    a("G01 Z"+zCur.toFixed(3));
    if(i<steps.length-1){
      const nextD=steps[i+1].diameter;
      if(nextD!==s.diameter){
        const fillet=s.fillet||0;
        if(fillet>0&&nextD<s.diameter){a("G02 X"+nextD.toFixed(3)+" Z"+(zCur-fillet).toFixed(3)+" R"+fillet.toFixed(1));zCur-=fillet;}
        else if(fillet>0&&nextD>s.diameter){a("G03 X"+nextD.toFixed(3)+" Z"+(zCur-fillet).toFixed(3)+" R"+fillet.toFixed(1));zCur-=fillet;}
        else{a("G01 X"+nextD.toFixed(3));}
      }
    }
  }
  // End chamfer
  const lastD=steps[steps.length-1].diameter;
  a("G01 X"+(lastD+ch*2).toFixed(3)+" Z"+(-tl).toFixed(3));
  a("N400 G01 X"+(bar+1).toFixed(3));b();

  // G70 finish
  cm("═══ 精車 G70 ═══");
  if(ctrl==="fanuc"||ctrl==="mitsubishi"){a("G00 T0202");a(spdF+" M03");if(p.useTNRC)a("G42");a("G70 P300 Q400");if(p.useTNRC)a("G40");}
  else if(ctrl==="okuma"){a("T0202");a(spdF+" M03");if(p.useTNRC)a("G42");a("G70 P300 Q400");if(p.useTNRC)a("G40");}
  else{a("T2D2");a(spdF+" M03");a('CYCLE95("CONTOUR1",0.05,0.02,0.02,,'+ff+",,,,0.2)");}
  a("G00 X"+(bar+2).toFixed(3)+" Z"+safe.toFixed(1));b();

  // Optional thread on end
  if(p.shaftHasThread&&thread&&thread.major){
    gcExtThread(ctrl,mat,thread,lastD,p.threadLength||10,tl,safe,p.threadInfeed,ch).forEach(l=>a(l));
  }
  // Optional grooves
  if(p.grooves&&p.grooves.length)gcGrooving(ctrl,mat,p.grooves,bar,safe,coolM,p.useG96).forEach(l=>a(l));
  gcCutoff(ctrl,mat,bar,tl,pw,safe,coolM,p.useG96).forEach(l=>a(l));
  gcEnd(ctrl).forEach(l=>a(l));
  return L.join("\n");
};

// ═══ 3. SLEEVE / BUSHING ═══
GENERATORS.sleeve=function(p,ctrl,mat,coolM,safe,bar,tl,pw,thread){
  const L=[];const a=l=>L.push(l);const b=()=>L.push("");

  gcSafeStart(ctrl,p.maxRPM||3500).forEach(l=>a(l));

    a("G71 P300 Q400 U0.3 W0.1 F"+rf);}
  else{a("G00 X"+(bar+2).toFixed(3)+" Z"+safe.toFixed(1));a(spdR+" M03");a(coolM);a('CYCLE95("CONTOUR1",'+rd+",0.3,0.1,,"+rf+",,,,0.5)");}b();
  cm("═══ 輪廓 ═══");

  if(ctrl!=="siemens"){a("G00 X"+(bar+2).toFixed(3)+" Z"+safe.toFixed(1));a(spdR+" M03");a(coolM);a("G71 U"+rd+" R0.5");a("G71 P300 Q400 U0.3 W0.1 F"+rf);}
  else{a("G00 X"+(bar+2).toFixed(3)+" Z"+safe.toFixed(1));a(spdR+" M03");a(coolM);a('CYCLE95("CONTOUR1",'+rd+",0.3,0.1,,"+rf+",,,,0.5)");}b();
  cm("═══ 錐面輪廓 ═══");
  a("N300 G00 X"+(d1-ch*2).toFixed(3)+" Z"+ch.toFixed(3));
  a("G01 X"+d1.toFixed(3)+" Z0 F"+ff);
  // Taper: from d1 at Z0 to d2 at Z=-tLen
  a("G01 X"+d2.toFixed(3)+" Z"+(-tLen).toFixed(3));cm("錐面");
  a("N400 G01 X"+(bar+1).toFixed(3));b();
  cm("═══ 精車 G70 ═══");
  if(ctrl!=="siemens"){a("G00 T0202");a(spdF+" M03");if(p.useTNRC)a("G42");a("G70 P300 Q400");if(p.useTNRC)a("G40");}
  else{a("T2D2");a(spdF+" M03");a('CYCLE95("CONTOUR1",0.05,0.02,0.02,,'+ff+",,,,0.2)");}
  a("G00 X"+(bar+2).toFixed(3)+" Z"+safe.toFixed(1));b();

  gcCutoff(ctrl,mat,bar,tLen,pw,safe,coolM,p.useG96).forEach(l=>a(l));
  gcEnd(ctrl).forEach(l=>a(l));
  return L.join("\n");
};

// ═══ TOOL LIST per part type ═══
function getSetupTools(p){
  const pt=p.partType;
  let thAngle=60;
  if(p.threadCategory&&THREAD_DB[p.threadCategory]&&THREAD_DB[p.threadCategory][p.threadSpec])thAngle=THREAD_DB[p.threadCategory][p.threadSpec].angle||60;
  const tools=[{pos:"T0101",name:"外徑粗車刀 CNMG120408",r:"R0.8",use:"端面+粗車"}];
  tools.push({pos:"T0202",name:"外徑精車刀 DNMG150404",r:"R0.4",use:"精車輪廓"});

  const hasExtThread=["screw","threadedRod","fitting"].includes(pt)||(pt==="shaft"&&p.shaftHasThread);
  if(hasExtThread){
    const tp=thAngle===55?"T0707":thAngle===29?"T0808":"T0303";
    const tn=thAngle===55?"螺紋刀 16ER 55°(BSP)":thAngle===29?"螺紋刀 16ER 29°(ACME)":"螺紋刀 16ER 60°";
    tools.push({pos:tp,name:tn,r:"—",use:"外螺紋"});
  }
  const hasGroove=["pin","groovedShaft"].includes(pt)||(["sleeve","fitting","flange","internalThread"].includes(pt));
  tools.push({pos:"T0404",name:"切斷/溝槽刀 GX24-3E",r:"—",use:(hasGroove?"溝槽+":"")+"切斷"});

  const needsDrill=["sleeve","fitting","flange","internalThread"].includes(pt);
  if(needsDrill||p.addCenterDrill)tools.push({pos:"T0505",name:"中心鑽 A3 Ø3",r:"—",use:"端面定心"});
  if(needsDrill)tools.push({pos:"T0606",name:"鑽頭 Ø"+(p.boreDiameter?Math.max(p.boreDiameter-2,p.boreDiameter*0.85).toFixed(1):"?"),r:"—",use:"鑽孔"});

  const needsBore=["sleeve","fitting","flange","internalThread"].includes(pt);
  if(needsBore)tools.push({pos:"T0909",name:"搪孔刀 S12M-SCLCR06",r:"R0.4",use:"搪孔精修"});

  if(pt==="internalThread"||(pt==="sleeve"&&p.hasInternalThread))tools.push({pos:"T1010",name:"內螺紋刀 16NR",r:"—",use:"內螺紋"});
  return tools;
}

// ═══ CYCLE TIME ═══
function calcCycleTime(p){
  const mat=MATERIALS[p.material]||MATERIALS["S45C 中碳鋼"];
  const bar=p.barDiameter||12,tl=p.totalLength||30;
  let od=bar-2;
  if(p.partType==="screw")od=p.shankDiameter||8;
  else if(p.outerDiameter)od=p.outerDiameter;
  else if(p.shaftSteps&&p.shaftSteps.length)od=Math.min(...p.shaftSteps.map(s=>s.diameter));

  const fT=(bar/2)/(calcRPM(mat.rough.Vc,bar/2)*mat.rough.f)*60;
  const rP=Math.ceil((bar-od)/2/mat.rough.ap);
  const rT=rP*(tl/(calcRPM(mat.rough.Vc,(bar+od)/2)*mat.rough.f)*60);
  const finT=tl/(calcRPM(mat.finish.Vc,od)*mat.finish.f)*60;

  let thT=0;
  const hasExtTh=["screw","threadedRod","fitting"].includes(p.partType)||(p.partType==="shaft"&&p.shaftHasThread);
  const hasIntTh=p.partType==="internalThread"||(p.partType==="sleeve"&&p.hasInternalThread);
  if(hasExtTh||hasIntTh){
    let pitch=1.25,thLen=p.threadLength||10;
    if(p.threadCategory&&THREAD_DB[p.threadCategory]?.[p.threadSpec])pitch=THREAD_DB[p.threadCategory][p.threadSpec].pitch;
    const thP=Math.max(6,10)+2;
    thT=thP*(thLen/(calcRPM(mat.thread.Vc,od)*pitch)*60);
  }

  let drillT=0,boreT=0;
  const needsDrill=["sleeve","fitting","flange","internalThread"].includes(p.partType);
  if(needsDrill&&p.boreDiameter){
    const dd=Math.max(p.boreDiameter-2,p.boreDiameter*0.85);
    const depth=p.boreType==="through"?tl+1:(p.boreDepth||tl*0.8);
    drillT=depth/(calcRPM(mat.drill.Vc,dd)*mat.drill.f)*60*1.5;
    boreT=depth/(calcRPM(mat.bore.Vc,p.boreDiameter)*mat.bore.f)*60*2;
  }

  let grooveT=0;
  if(p.grooves&&p.grooves.length)grooveT=p.grooves.length*5;

  const cT=(bar/2)/(calcRPM(mat.cutoff.Vc,bar/2)*mat.cutoff.f)*60;
  const total=fT+rT+finT+thT+drillT+boreT+grooveT+cT+8;
  return{face:Math.round(fT),rough:Math.round(rT),finish:Math.round(finT),thread:Math.round(thT),drill:Math.round(drillT),bore:Math.round(boreT),groove:Math.round(grooveT),cutoff:Math.round(cT),rapid:8,total:Math.round(total)};
}

function validateParams(p){
  const w=[],e=[];
  const pt=p.partType;
  if(p.barDiameter<=0)e.push("棒材直徑必須>0");
  if(p.totalLength<=0)e.push("總長度必須>0");
  if(pt==="screw"){
    if(p.barDiameter<=(p.headDiameter||0))e.push("棒材直徑必須大於頭部直徑");
    if(p.barDiameter<=(p.shankDiameter||0))e.push("棒材直徑必須大於桿部直徑");
    if((p.threadLength||0)>p.totalLength)e.push("螺紋長度不能超過總長度");
  }
  if(pt==="sleeve"||pt==="internalThread"||pt==="fitting"||pt==="flange"){
    if((p.boreDiameter||0)>=(p.outerDiameter||p.barDiameter))e.push("內孔直徑必須小於外徑");
  }
  if(pt==="shaft"&&p.shaftSteps){
    p.shaftSteps.forEach((s,i)=>{if(s.diameter>=p.barDiameter)w.push("段"+(i+1)+"直徑≥棒材直徑");});
    const sumL=p.shaftSteps.reduce((a,s)=>a+s.length,0);
    if(Math.abs(sumL-p.totalLength)>0.5)w.push("各段長度合計("+sumL.toFixed(1)+")與總長("+p.totalLength+")不符");
  }
  if(pt==="taper"){
    const tStd=p.taperStandard?TAPER_STDS[p.taperStandard]:null;
    const d1=tStd?tStd.d1:(p.taperD1||20);
    if(d1>=p.barDiameter)e.push("錐面大徑必須小於棒材直徑");
  }
  const mat=MATERIALS[p.material];
  if(mat){const rpm=calcRPM(mat.finish.Vc,p.outerDiameter||p.shankDiameter||8);if(rpm>4000)w.push("精車轉速可能達"+rpm+"RPM，確認主軸上限");}
  if(p.barDiameter>42)w.push("棒材>Ø42mm，確認夾頭容量");
  return{warnings:w,errors:e};
}

// ═══ PART PREVIEW (Universal) ═══
function PartPreview({params:p}){
  const pt=p.partType;
  const tl=p.totalLength||30,bar=p.barDiameter||12,ch=p.chamferSize||0.5;
  let segments=[];// {z,d} pairs for profile

  if(pt==="screw"){
    let thread=null;
    if(p.threadSpec==="自訂")thread=p.customThread;
    else if(p.threadCategory&&THREAD_DB[p.threadCategory])thread=THREAD_DB[p.threadCategory][p.threadSpec];
    const hd=p.headDiameter||13,hl=p.headLength||5,sd=p.shankDiameter||8,thLen=p.threadLength||20;
    segments=[{z:0,d:hd},{z:-hl,d:hd},{z:-hl,d:sd},{z:-tl,d:sd}];
  }else if(pt==="shaft"){
    const steps=p.shaftSteps||[{diameter:bar-2,length:tl}];let z=0;
    steps.forEach(s=>{segments.push({z:z,d:s.diameter});z-=s.length;segments.push({z:z,d:s.diameter});});
  }else if(pt==="sleeve"||pt==="internalThread"){
    const od=p.outerDiameter||bar-1;
    segments=[{z:0,d:od},{z:-tl,d:od}];
  }else if(pt==="threadedRod"){
    let thread=null;if(p.threadCategory&&THREAD_DB[p.threadCategory])thread=THREAD_DB[p.threadCategory][p.threadSpec];
    const sd=thread?thread.major:bar-2;
    segments=[{z:0,d:sd},{z:-tl,d:sd}];
  }else if(pt==="pin"||pt==="groovedShaft"){
    const od=p.outerDiameter||bar-1;
    segments=[{z:0,d:od},{z:-tl,d:od}];
  }else if(pt==="fitting"){
    let thread=null;if(p.threadCategory&&THREAD_DB[p.threadCategory])thread=THREAD_DB[p.threadCategory][p.threadSpec];
    const sd=thread?thread.major:bar-2,hexD=p.fittingHexDia||sd*1.7,hexLen=p.fittingHexLen||sd;
    const thLen1=p.threadLength||10;
    segments=[{z:0,d:sd},{z:-thLen1,d:sd},{z:-thLen1,d:hexD},{z:-(thLen1+hexLen),d:hexD},{z:-(thLen1+hexLen),d:sd},{z:-tl,d:sd}];
  }else if(pt==="flange"){
    const od=p.outerDiameter||bar-1,hubD=p.hubDiameter||0,hubL=p.hubLength||0;
    if(hubD>0&&hubL>0)segments=[{z:0,d:hubD},{z:-hubL,d:hubD},{z:-hubL,d:od},{z:-tl,d:od}];
    else segments=[{z:0,d:od},{z:-tl,d:od}];
  }else if(pt==="taper"){
    const tStd=p.taperStandard?TAPER_STDS[p.taperStandard]:null;
    const d1=tStd?tStd.d1:(p.taperD1||20),d2=tStd?tStd.d2:(p.taperD2||15);
    const tLen=tStd?tStd.length:tl;
    segments=[{z:0,d:d1},{z:-tLen,d:d2}];
  }

  if(!segments.length)return null;
  const maxD=Math.max(...segments.map(s=>s.d),bar);
  const maxZ=Math.max(Math.abs(segments[segments.length-1]?.z||tl),tl);
  const sc=Math.min(8,300/maxZ),px=30,py=20;
  const w=maxZ*sc+px*2+50,h=maxD*sc+py*2+50,cy=h/2;
  const sx=v=>px+(-v)*sc,sy=(d,top)=>top?cy-(d/2)*sc:cy+(d/2)*sc;

  const topPts=segments.map(s=>[sx(s.z),sy(s.d,true)]);
  const botPts=segments.map(s=>[sx(s.z),sy(s.d,false)]);

  // bore line
  const boreDia=p.boreDiameter||0;
  const hasBore=["sleeve","fitting","flange","internalThread"].includes(pt)&&boreDia>0;

  // grooves
  const grooves=p.grooves||[];
  const grooveRects=grooves.map(g=>{
    const od2=p.outerDiameter||bar-1;
    return{x:sx(-g.zPos-g.width),y:sy(od2,true),w:g.width*sc,h:(od2-g.diameter)*sc/2};
  });

  // thread area
  let thArea=null;
  if(["screw","threadedRod","fitting"].includes(pt)||(pt==="shaft"&&p.shaftHasThread)){
    let thread=null;if(p.threadCategory&&THREAD_DB[p.threadCategory])thread=THREAD_DB[p.threadCategory][p.threadSpec];
    const thLen=p.threadLength||10;
    if(pt==="screw")thArea={zStart:-(tl-thLen),zEnd:-tl,d:p.shankDiameter||8};
    else if(pt==="threadedRod")thArea={zStart:0,zEnd:-tl,d:thread?thread.major:bar-2};
    else if(pt==="fitting"){thArea={zStart:0,zEnd:-(p.threadLength||10),d:thread?thread.major:bar-2};}
    else if(pt==="shaft")thArea={zStart:-(tl-thLen),zEnd:-tl,d:p.shaftSteps?p.shaftSteps[p.shaftSteps.length-1].diameter:bar-2};
  }

  const teeth=[];
  if(thArea){
    const pitch=(()=>{let t;if(p.threadCategory&&THREAD_DB[p.threadCategory])t=THREAD_DB[p.threadCategory][p.threadSpec];return t?t.pitch:1.25;})();
    const cnt=Math.min(Math.floor(Math.abs(thArea.zEnd-thArea.zStart)/pitch),35);
    for(let i=0;i<cnt;i++){
      const tz=thArea.zStart-i*pitch,tx=sx(tz);
      teeth.push("M "+tx+","+sy(thArea.d,true)+" L "+(tx-pitch*sc*0.5)+","+(sy(thArea.d,true)-3)+" L "+(tx-pitch*sc)+","+sy(thArea.d,true));
      teeth.push("M "+tx+","+sy(thArea.d,false)+" L "+(tx-pitch*sc*0.5)+","+(sy(thArea.d,false)+3)+" L "+(tx-pitch*sc)+","+sy(thArea.d,false));
    }
  }

  const E=React.createElement;
  return E("svg",{viewBox:"0 0 "+w+" "+h,style:{width:"100%",background:"#080c14",borderRadius:6,border:"1px solid #141e2e"}},
    E("line",{x1:px-5,y1:cy,x2:sx(-maxZ)+20,y2:cy,stroke:"#1e2a3a",strokeWidth:0.5,strokeDasharray:"6 3"}),
    E("path",{d:"M "+topPts.map(p2=>p2.join(",")).join(" L "),fill:"none",stroke:"#5ba0f7",strokeWidth:1.5}),
    E("path",{d:"M "+botPts.map(p2=>p2.join(",")).join(" L "),fill:"none",stroke:"#5ba0f7",strokeWidth:1.5}),
    E("path",{d:"M "+topPts.map(p2=>p2.join(",")).join(" L ")+" L "+topPts[topPts.length-1][0]+","+cy+" L "+topPts[0][0]+","+cy+" Z",fill:"#5ba0f712"}),
    E("path",{d:"M "+botPts.map(p2=>p2.join(",")).join(" L ")+" L "+botPts[botPts.length-1][0]+","+cy+" L "+botPts[0][0]+","+cy+" Z",fill:"#5ba0f712"}),
    hasBore&&E("line",{x1:sx(0),y1:sy(boreDia,true),x2:sx(-tl),y2:sy(boreDia,true),stroke:"#e06c75",strokeWidth:1,strokeDasharray:"4 2"}),
    hasBore&&E("line",{x1:sx(0),y1:sy(boreDia,false),x2:sx(-tl),y2:sy(boreDia,false),stroke:"#e06c75",strokeWidth:1,strokeDasharray:"4 2"}),
    teeth.length>0&&E("path",{d:teeth.join(" "),fill:"none",stroke:"#f0803c",strokeWidth:0.7,opacity:0.5}),
    grooveRects.map((g,i)=>E("rect",{key:i,x:g.x,y:g.y,width:g.w,height:g.h,fill:"#e06c7530",stroke:"#e06c75",strokeWidth:0.5})),
    grooveRects.map((g,i)=>E("rect",{key:"b"+i,x:g.x,y:cy,width:g.w,height:g.h,fill:"#e06c7530",stroke:"#e06c75",strokeWidth:0.5})),
    E("text",{x:(sx(0)+sx(-maxZ))/2,y:sy(maxD,false)+18,fill:"#b8c8d8",fontSize:9,textAnchor:"middle"},tl+"mm"),
    segments.length>0&&E("text",{x:sx(0)+5,y:sy(segments[0].d,true)-5,fill:"#e8a838",fontSize:8,textAnchor:"start"},"Ø"+segments[0].d),
    hasBore&&E("text",{x:sx(-tl/2),y:cy+4,fill:"#e06c75",fontSize:8,textAnchor:"middle"},"Ø"+boreDia)
  );
}

          E("div",{style:CD},E("div",{style:CT},"📐 外形與孔"),
            E("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10},className:"grid3"},
              E(Field,{label:"總長 mm"},inp("totalLength",0.1)),
              E(Field,{label:"外徑 mm"},inp("outerDiameter",0.01)),
              E(Field,{label:"孔型"},sel("boreType",[["through","通孔"],["blind","盲孔"]])),
              p.boreType==="blind"&&E(Field,{label:"孔深 mm"},inp("boreDepth",0.1)),
              E(Field,{label:"倒角C mm"},inp("chamferSize",0.1))))),

        // ─── TAPER ───
        p.partType==="taper"&&E("div",null,
          E("div",{style:CD},E("div",{style:CT},"📐 錐度"),
            E("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10},className:"grid3"},
              E(Field,{label:"標準錐度"},E("select",{value:p.taperStandard,onChange:e=>{u("taperStandard",e.target.value);const ts=TAPER_STDS[e.target.value];if(ts&&!ts.custom){u("totalLength",ts.length);u("taperD1",ts.d1);u("taperD2",ts.d2);if(ts.d1+2>p.barDiameter)u("barDiameter",Math.ceil(ts.d1)+2);}},style:SS},Object.keys(TAPER_STDS).map(k=>E("option",{key:k,value:k},k)))),
              E(Field,{label:"倒角C mm"},inp("chamferSize",0.1))),
            (p.taperStandard==="自訂錐度"||TAPER_STDS[p.taperStandard]?.custom)&&E("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:8},className:"grid3"},
              E(Field,{label:"大徑 mm"},inp("taperD1",0.01)),
              E(Field,{label:"小徑 mm"},inp("taperD2",0.01)),
              E(Field,{label:"錐長 mm"},inp("totalLength",0.1))),
            !TAPER_STDS[p.taperStandard]?.custom&&TAPER_STDS[p.taperStandard]&&E("div",{style:{marginTop:8,padding:8,background:"#050810",borderRadius:3,fontSize:10,color:"#3a4a5a"}},
              "大徑 Ø"+TAPER_STDS[p.taperStandard].d1+" → 小徑 Ø"+TAPER_STDS[p.taperStandard].d2+" 長 "+TAPER_STDS[p.taperStandard].length+"mm"))),

        // ─── Validation + Cycle Time ───
        (val.errors.length>0||val.warnings.length>0)&&E("div",{style:{marginBottom:10,marginTop:10}},
          val.errors.map((e2,i)=>E("div",{key:i,style:{padding:6,background:"#140808",border:"1px solid #301818",borderRadius:3,color:"#d04040",fontSize:11,marginBottom:3}},"❌ "+e2)),
          val.warnings.map((w2,i)=>E("div",{key:i,style:{padding:6,background:"#141408",border:"1px solid #303018",borderRadius:3,color:"#a09030",fontSize:11,marginBottom:3}},"⚠️ "+w2))),
        E("div",{style:{padding:8,background:"#060a12",border:"1px solid #101820",borderRadius:4,fontSize:10,color:"#3a4a5a",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginTop:10}},
          E("span",{style:{color:"#f0803c",fontWeight:700}},"預估:"),
          ct.face>0&&E("span",null,"端面"+ct.face+"s"),ct.rough>0&&E("span",null,"粗車"+ct.rough+"s"),
          ct.finish>0&&E("span",null,"精車"+ct.finish+"s"),ct.thread>0&&E("span",null,"螺紋"+ct.thread+"s"),
          ct.drill>0&&E("span",null,"鑽孔"+ct.drill+"s"),ct.bore>0&&E("span",null,"搪孔"+ct.bore+"s"),
          ct.groove>0&&E("span",null,"溝槽"+ct.groove+"s"),ct.cutoff>0&&E("span",null,"切斷"+ct.cutoff+"s"),
          E("span",{style:{color:"#e0e8f0",fontWeight:700}},"合計≈"+ct.total+"s ("+(ct.total/60).toFixed(1)+"min)")),
        E("div",{style:{display:"flex",gap:8,marginTop:20,justifyContent:"space-between"}},
          E("button",{onClick:()=>setStep(2),style:B2},"← 上一步"),
          E("button",{onClick:generate,disabled:val.errors.length>0,style:{...B1,opacity:val.errors.length?0.3:1}},"⚡ 產生 G-Code"))),
      // ═══ STEP 4: Output ═══
      step===4&&E("div",null,
        E("h2",{style:{fontSize:16,fontWeight:700,color:"#e0e8f0",marginBottom:4}},"程式輸出"),
        E("div",{style:{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}},
          [PART_TYPES[p.partType].name,p.controller,p.threadSpec||"",p.material,"L="+p.totalLength].filter(Boolean).map((t2,i)=>E("span",{key:i,style:{padding:"2px 6px",background:"#0a0e16",borderRadius:3,fontSize:9.5,color:["#f0803c","#5ba0f7","#56b6c2","#c678dd","#e8a838"][i]}},t2))),
        E("div",{style:{display:"flex",gap:0,marginBottom:10,borderBottom:"1px solid #101820"}},
          [["gcode","G-Code"],["preview","零件圖"],["setup","刀具表"],["time","工時"]].map(([id,lb])=>E("button",{key:id,onClick:()=>setTab(id),style:{padding:"6px 14px",background:"transparent",border:"none",borderBottom:tab===id?"2px solid #f0803c":"2px solid transparent",color:tab===id?"#f0803c":"#3a4a5a",fontSize:11,cursor:"pointer",fontWeight:tab===id?700:400}},lb))),

        tab==="gcode"&&E("div",null,
          E(GCodeViewer,{code:gcode}),
          E("div",{style:{marginTop:10,padding:8,background:"#100e08",border:"1px solid #282418",borderRadius:4,fontSize:10.5,color:"#a09030"}},
            "⚠️ ",E("strong",null,"上機前："),"確認座標系、刀補值、安全高度。先空跑(DryRun/單節)確認。程式為參考基礎，需依實際調整。")),

        tab==="preview"&&E(PartPreview,{params:p}),

        tab==="setup"&&E("div",{style:{background:"#060a12",borderRadius:4,border:"1px solid #101820",overflow:"hidden"}},
          E("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:11}},
            E("thead",null,E("tr",{style:{background:"#0a0e16"}},["刀位","刀具","R","用途"].map(h=>E("th",{key:h,style:{padding:"6px 8px",textAlign:"left",color:"#4a5a6a",fontWeight:600,fontSize:9.5}},h)))),
            E("tbody",null,tools.map((t2,i)=>E("tr",{key:i,style:{borderTop:"1px solid #0a0e16"}},
              E("td",{style:{padding:"6px 8px",color:"#f0803c",fontFamily:"monospace"}},t2.pos),
              E("td",{style:{padding:"6px 8px",color:"#b8c8d8"}},t2.name),
              E("td",{style:{padding:"6px 8px",color:"#4a5a6a"}},t2.r),
              E("td",{style:{padding:"6px 8px",color:"#4a5a6a"}},t2.use)))))),

        tab==="time"&&E("div",{style:{background:"#060a12",borderRadius:4,border:"1px solid #101820",padding:14}},
          E("div",{style:{fontSize:12,fontWeight:700,color:"#e0e8f0",marginBottom:10}},"加工時間分析"),
          [{l:"端面",t:ct.face,c:"#5ba0f7"},{l:"粗車",t:ct.rough,c:"#e8a838"},{l:"精車",t:ct.finish,c:"#56b6c2"},{l:"螺紋",t:ct.thread,c:"#f0803c"},{l:"鑽孔",t:ct.drill,c:"#98c379"},{l:"搪孔",t:ct.bore,c:"#e06c75"},{l:"溝槽",t:ct.groove,c:"#d19a66"},{l:"切斷",t:ct.cutoff,c:"#c678dd"},{l:"快移",t:ct.rapid,c:"#3a4a5a"}].filter(it=>it.t>0).map((it,i)=>
            E("div",{key:i,style:{display:"flex",alignItems:"center",gap:8,marginBottom:6}},
              E("div",{style:{width:50,fontSize:10,color:"#5a6a7a"}},it.l),
              E("div",{style:{flex:1,height:14,background:"#0a0e16",borderRadius:2,overflow:"hidden"}},
                E("div",{style:{height:"100%",width:Math.max(3,(it.t/ct.total*100))+"%",background:it.c,borderRadius:2}})),
              E("div",{style:{width:40,fontSize:10,color:"#5a6a7a",textAlign:"right"}},it.t+"s"))),
          E("div",{style:{marginTop:10,padding:8,background:"#0a0e16",borderRadius:3,display:"flex",justifyContent:"space-between",fontSize:12}},
            E("span",{style:{color:"#5a6a7a"}},"單件"),
            E("span",{style:{color:"#e0e8f0",fontWeight:700}},ct.total+"s ("+(ct.total/60).toFixed(1)+"min)")),
          E("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10,color:"#3a4a5a",marginTop:4}},
            E("span",null,"100件 ≈ "+(ct.total*100/3600).toFixed(1)+"hr"),
            E("span",null,"1000件 ≈ "+(ct.total*1000/3600).toFixed(1)+"hr"))),

        E("div",{style:{display:"flex",gap:8,marginTop:16,justifyContent:"space-between",flexWrap:"wrap"}},
          E("button",{onClick:()=>setStep(3),style:B2},"← 修改"),
          E("div",{style:{display:"flex",gap:6}},
            E("button",{onClick:copyCode,style:B2},copied?"✅ 已複製":"📋 複製"),
            E("button",{onClick:()=>dl(gcode,PART_TYPES[p.partType].name+"_"+(p.threadSpec||"").replace(/[×\/]/g,"x")+"_"+p.controller.split(" ")[0]+".nc"),style:B1},"💾 下載.nc"))))));
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
